{% extends "base.html" %}
{% block title %}Alugar Chopeira #{{ chopeira.numero }}{% endblock %}

{% block content %}

<div class="card card-centered alugar-chopeira-card" style="max-width: 560px; margin: 0 auto;">

  <div class="page-header">
    <div>
      <h1 class="page-title">Alugar chopeira #{{ chopeira.numero }}</h1>
      <p class="page-subtitle">Preencha os dados do cliente e equipamentos opcionais</p>
    </div>
    <div class="page-actions">
      <a href="{{ url_for('admin.chopeiras') }}" class="btn btn-outline btn-sm">← Voltar</a>
    </div>
  </div>

  <form method="post" class="form">

    <label>Nome do cliente</label>
    <input type="text" name="cliente_nome" required placeholder="Ex.: João da Silva">

    <label>Telefone</label>
    <input type="text" name="telefone" placeholder="(00) 00000-0000">

    <label>Endereço</label>
    <input type="text" name="endereco" placeholder="Rua, número, bairro">

    <label style="margin-top: var(--sp-2);">Tipo do KEG</label>
    <select name="keg_tipo" required>
      <option value="">Selecione…</option>
      <option value="KEG1">KEG 1</option>
      <option value="KEG2">KEG 2</option>
    </select>

    <div class="equipamentos-form">
      <p class="equipamentos-titulo">Equipamentos opcionais</p>

      <label class="checkbox">
        <input type="checkbox" name="alugou_co2" value="1">
        Cilindro de CO₂
      </label>

      <label class="checkbox">
        <input type="checkbox" name="alugou_manometro" value="1">
        Manômetro
      </label>

      <label class="checkbox">
        <input type="checkbox" name="alugou_pingadeira" value="1">
        Pingadeira
      </label>
    </div>

    <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: var(--sp-3);">
      Confirmar aluguel
    </button>

  </form>
</div>

{% endblock %}
