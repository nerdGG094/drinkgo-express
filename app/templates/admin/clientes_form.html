{% extends "base.html" %}
{% block title %}{{ 'Editar Cliente' if cliente else 'Novo Cliente' }}{% endblock %}

{% block content %}

<div class="card card-centered" style="max-width: 560px; margin: 0 auto;">

  <div class="page-header">
    <div>
      <h1 class="page-title">{{ 'Editar cliente' if cliente else 'Novo cliente' }}</h1>
    </div>
    <div class="page-actions">
      <a href="{{ url_for('admin.clientes') }}" class="btn btn-outline btn-sm">← Voltar</a>
    </div>
  </div>

  <form method="post" class="form">
    <label>Código</label>
    <input type="text" name="codigo" value="{{ cliente.codigo if cliente else '' }}" placeholder="(opcional)">

    <label>Nome</label>
    <input type="text" name="nome" value="{{ cliente.nome if cliente else '' }}" required>

    <label>Telefone</label>
    <input type="text" name="telefone" value="{{ cliente.telefone if cliente else '' }}" placeholder="(00) 00000-0000">

    <label>Endereço</label>
    <input type="text" name="endereco" value="{{ cliente.endereco if cliente else '' }}">

    <label>Observações</label>
    <textarea name="obs" rows="2">{{ cliente.obs if cliente else '' }}</textarea>

    {% if cliente %}
    <label class="checkbox" style="margin-top: var(--sp-2);">
      <input type="checkbox" name="ativo" value="1" {% if cliente.ativo %}checked{% endif %}>
      Cliente ativo
    </label>
    {% endif %}

    <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top: var(--sp-3);">
      Salvar cliente
    </button>
  </form>

</div>

{% endblock %}
